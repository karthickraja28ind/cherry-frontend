<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Home · Cherry</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body data-page="home">

<div class="app-shell">
  <div class="sidebar-overlay" id="sidebar-overlay"></div>
  <aside class="sidebar" id="sidebar"></aside>

  <div style="flex:1;display:flex;flex-direction:column;min-width:0;">
    <div class="topbar" id="topbar-root"></div>

    <main class="main">
      <div class="main-inner">
        <div class="page-head">
          <div>
            <h1>Home</h1>
            <span class="sub">What's happening across the world</span>
          </div>
          <div class="search-box" style="width:220px;">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
            <input type="text" id="feed-search" placeholder="Search insights…">
          </div>
        </div>

        <!-- Composer -->
        <form class="card composer" id="composer-form">
          <div class="composer-row">
            <div id="composer-avatar"></div>
            <textarea id="composer-content" placeholder="Share something with the world…" rows="2"></textarea>
          </div>
          <input type="text" id="composer-title" placeholder="Add a short title for your insight" style="border:none;outline:none;font-weight:700;font-size:14px;font-family:var(--font-body);width:100%;margin-top:8px;padding-left:56px;background:transparent;">
          <div class="composer-preview" id="composer-preview">
            <img id="composer-preview-img" src="" alt="Selected image">
            <button type="button" class="remove-img" id="composer-remove-img">&times;</button>
          </div>
          <div class="composer-foot">
            <div class="composer-actions">
              <label class="icon-btn" for="composer-image" title="Add image">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="3" width="18" height="18" rx="3"/><circle cx="8.5" cy="8.5" r="1.8"/><path d="m21 15-5-5L5 21"/></svg>
              </label>
              <input type="file" id="composer-image" accept="image/*" style="display:none;">
            </div>
            <button type="submit" class="btn btn-primary btn-sm" id="composer-submit">Share Insight</button>
          </div>
        </form>

        <div class="tabs" id="feed-tabs">
          <div class="tab active" data-feed="home">For you</div>
          <div class="tab" data-feed="latest">Latest</div>
          <div class="tab" data-feed="trending">Trending</div>
          <div class="tab" data-feed="all">All insights</div>
        </div>

        <div id="feed-list"></div>
      </div>
    </main>
  </div>
</div>

<script src="js/api.js"></script>
<script src="js/ui.js"></script>
<script src="js/auth.js"></script>
<script src="js/app.js"></script>
<script src="js/globalsearch.js"></script>
<script src="js/postcard.js"></script>
<script src="js/home.js"></script>
</body>
</html>
