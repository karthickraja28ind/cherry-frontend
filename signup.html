<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Create account · Cherry</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="auth-shell">
  <div class="auth-brand">
    <div class="logo">
      <span class="logo-word">Cherry</span>
      <svg viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M20 6c-1.5 2-2 4-2 6" stroke="white" stroke-width="1.8" stroke-linecap="round"/>
        <path d="M20 6c2-1.3 4-1.6 5.5-1" stroke="white" stroke-width="1.8" stroke-linecap="round"/>
        <circle cx="12" cy="21" r="7" fill="white"/>
        <circle cx="22" cy="19" r="6" fill="rgba(255,255,255,0.55)"/>
      </svg>
    </div>
    <div class="auth-brand-copy">
      <h1>Join the conversation.</h1>
      <p>Create your profile, share your first insight, and start following the people worth following.</p>
    </div>
    <div class="auth-brand-foot">© 2026 Cherry</div>
  </div>

  <div class="auth-form-wrap">
    <form class="auth-form" id="signup-form" novalidate>
      <h2>Create your account</h2>
      <span class="sub">It takes less than a minute.</span>

      <div class="field" id="f-username">
        <label for="username">Username</label>
        <input type="text" id="username" autocomplete="username" placeholder="e.g. sam_writes" required>
        <div class="field-error">Username cannot be empty.</div>
      </div>

      <div class="field" id="f-email">
        <label for="email">Email</label>
        <input type="email" id="email" autocomplete="email" placeholder="you@example.com" required>
        <div class="field-error">Enter a valid email.</div>
      </div>

      <div class="field" id="f-password">
        <label for="password">Password</label>
        <input type="password" id="password" autocomplete="new-password" placeholder="••••••••" required>
        <div class="field-error">Password cannot be empty.</div>
      </div>

      <button class="btn btn-primary btn-block" type="submit" id="signup-btn">Create account</button>

      <div class="auth-switch">Already on Cherry? <a href="index.html">Sign in</a></div>
    </form>
  </div>
</div>

<script src="js/api.js"></script>
<script src="js/ui.js"></script>
<script src="js/auth.js"></script>
<script>
  redirectIfAuthed();

  const form = document.getElementById('signup-form');
  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    const username = document.getElementById('username').value.trim();
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;

    let ok = true;
    const emailValid = /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
    document.getElementById('f-username').classList.toggle('has-error', !username); if(!username) ok=false;
    document.getElementById('f-email').classList.toggle('has-error', !emailValid); if(!emailValid) ok=false;
    document.getElementById('f-password').classList.toggle('has-error', !password); if(!password) ok=false;
    if (!ok) return;

    const btn = document.getElementById('signup-btn');
    btn.disabled = true; btn.textContent = 'Creating account…';
    try{
      await doSignup({ username, email, password });
      location.href = 'index.html?signedup=1';
    }catch(err){
      toastError(err.message || 'Could not create your account.');
      btn.disabled = false; btn.textContent = 'Create account';
    }
  });
</script>
</body>
</html>
