<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Connections · Cherry</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body data-page="profile">

<div class="app-shell">
  <div class="sidebar-overlay" id="sidebar-overlay"></div>
  <aside class="sidebar" id="sidebar"></aside>

  <div style="flex:1;display:flex;flex-direction:column;min-width:0;">
    <div class="topbar" id="topbar-root"></div>

    <main class="main">
      <div class="main-inner">
        <a href="javascript:history.back()" class="btn btn-ghost btn-sm" style="margin-bottom:14px;">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m15 18-6-6 6-6"/></svg>
          Back
        </a>
        <div class="page-head">
          <div>
            <h1 id="connections-title">Followers</h1>
          </div>
        </div>
        <div class="tabs" id="connection-tabs">
          <div class="tab" data-type="followers">Followers</div>
          <div class="tab" data-type="following">Following</div>
        </div>
        <div class="card">
          <div id="connections-list"></div>
        </div>
      </div>
    </main>
  </div>
</div>

<script src="js/api.js"></script>
<script src="js/ui.js"></script>
<script src="js/auth.js"></script>
<script src="js/app.js"></script>
<script src="js/globalsearch.js"></script>
<script src="js/userrow.js"></script>
<script src="js/connections.js"></script>
</body>
</html>
