<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Explore · Cherry</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body data-page="users">

<div class="app-shell">
  <div class="sidebar-overlay" id="sidebar-overlay"></div>
  <aside class="sidebar" id="sidebar"></aside>

  <div style="flex:1;display:flex;flex-direction:column;min-width:0;">
    <div class="topbar" id="topbar-root"></div>

    <main class="main">
      <div class="main-inner">
        <div class="page-head">
          <div>
            <h1>Explore</h1>
            <span class="sub">Find people to follow</span>
          </div>
        </div>

        <div class="search-box mt-0" style="margin-bottom:18px;">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
          <input type="text" id="user-search" placeholder="Search by username…">
        </div>

        <div class="card">
          <div id="users-list"></div>
        </div>
      </div>
    </main>
  </div>
</div>

<script src="js/api.js"></script>
<script src="js/ui.js"></script>
<script src="js/auth.js"></script>
<script src="js/app.js"></script>
<script src="js/globalsearch.js"></script>
<script src="js/userrow.js"></script>
<script src="js/users.js"></script>
</body>
</html>
