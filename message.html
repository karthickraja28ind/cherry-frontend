<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Message · Cherry</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body data-page="message">

<div class="app-shell">
  <div class="sidebar-overlay" id="sidebar-overlay"></div>
  <aside class="sidebar" id="sidebar"></aside>

  <div style="flex:1;display:flex;flex-direction:column;min-width:0;">
    <div class="topbar" id="topbar-root"></div>

    <main class="main">
      <div class="main-inner" style="max-width:640px;">
        <a href="messages.html" class="btn btn-ghost btn-sm" style="margin-bottom:14px;display:inline-flex;">&lsaquo; Back to messages</a>

        <div class="card" style="padding:0;overflow:hidden;display:flex;flex-direction:column;height:70vh;">
          <div id="message-thread-header" style="padding:14px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;"></div>

          <div id="message-thread" style="flex:1;overflow-y:auto;padding:16px 18px;display:flex;flex-direction:column;gap:10px;"></div>

          <form id="message-form" style="display:flex;gap:8px;padding:14px 18px;border-top:1px solid var(--border);align-items:flex-start;">
            <div class="field" style="flex:1;margin-bottom:0;">
              <input type="text" id="message-input" placeholder="Write a message…" autocomplete="off">
            </div>
            <button type="submit" class="btn btn-primary btn-sm" id="message-send-btn">Send</button>
          </form>
        </div>
      </div>
    </main>
  </div>
</div>

<script src="js/api.js"></script>
<script src="js/ui.js"></script>
<script src="js/auth.js"></script>
<script src="js/app.js"></script>
<script src="js/globalsearch.js"></script>
<script src="js/message.js"></script>
</body>
</html>
