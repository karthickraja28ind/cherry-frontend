<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profile · Cherry</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body data-page="profile">

<div class="app-shell">
  <div class="sidebar-overlay" id="sidebar-overlay"></div>
  <aside class="sidebar" id="sidebar"></aside>

  <div style="flex:1;display:flex;flex-direction:column;min-width:0;">
    <div class="topbar" id="topbar-root"></div>

    <main class="main">
      <div class="main-inner">
        <div id="profile-wrap"><div class="spinner-wrap"><div class="spinner"></div></div></div>

        <div class="tabs" style="margin-top:22px;">
          <div class="tab active">Insights</div>
        </div>
        <div id="profile-posts"></div>
      </div>
    </main>
  </div>
</div>

<input type="file" id="picture-input" accept="image/*" style="display:none;">

<script src="js/api.js"></script>
<script src="js/ui.js"></script>
<script src="js/auth.js"></script>
<script src="js/app.js"></script>
<script src="js/globalsearch.js"></script>
<script src="js/postcard.js"></script>
<script src="js/profile.js"></script>
</body>
</html>
