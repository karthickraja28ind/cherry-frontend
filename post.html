<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Insight · Cherry</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body data-page="home">

<div class="app-shell">
  <div class="sidebar-overlay" id="sidebar-overlay"></div>
  <aside class="sidebar" id="sidebar"></aside>

  <div style="flex:1;display:flex;flex-direction:column;min-width:0;">
    <div class="topbar" id="topbar-root"></div>

    <main class="main">
      <div class="main-inner">
        <a href="javascript:history.back()" class="btn btn-ghost btn-sm" style="margin-bottom:14px;">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m15 18-6-6 6-6"/></svg>
          Back
        </a>

        <div id="post-wrap"><div class="spinner-wrap"><div class="spinner"></div></div></div>

        <div class="card card-pad" style="margin-top:18px;">
          <h3 style="font-size:15px;margin-bottom:14px;">Comments</h3>
          <form id="comment-form" style="display:flex; gap:10px; margin-bottom:6px;">
            <div id="comment-avatar"></div>
            <input type="text" id="comment-input" placeholder="Write a comment…" style="flex:1;border:1.5px solid var(--border);border-radius:999px;padding:10px 16px;font-size:14px;font-family:var(--font-body);">
            <button class="btn btn-primary btn-sm" type="submit">Reply</button>
          </form>
          <div class="divider"></div>
          <div id="comments-list"></div>
        </div>
      </div>
    </main>
  </div>
</div>

<script src="js/api.js"></script>
<script src="js/ui.js"></script>
<script src="js/auth.js"></script>
<script src="js/app.js"></script>
<script src="js/globalsearch.js"></script>
<script src="js/postcard.js"></script>
<script src="js/post.js"></script>
</body>
</html>
